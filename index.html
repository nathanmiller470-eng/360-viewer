<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <title>My 360 Viewer</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.css"/>
    <script src="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.js"></script>
    <style>
        #panorama {
            width: 100%;
    height: 1000px;
        }
    </style>
</head>
<body>

<div id="panorama"></div>

<script>
pannellum.viewer('panorama', {
  "type": "equirectangular",
  "panorama": "pano.jpg",
  "autoLoad": true,

"hotSpots": [
        {
            "pitch": 5,
            "yaw": 100,
            "type": "info",
            "text": "Raspberry Ridge Line"
        },
        {
            "pitch": -10,
            "yaw": -60,
            "type": "info",
            "text": "Old Mine Entrance"
        }
    ]
    
  // FOV control (all in degrees)
  "hfov": 80,        // start FOV (smaller = flatter/less “globe”)
  "minHfov": 50,     // prevent super-wide distortion
  "maxHfov": 100     // allow some zoom-out, but not crazy
});
</script>

</body>

</html>
